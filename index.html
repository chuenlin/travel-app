<!DOCTYPE html>
<html lang="zh-TW">
<head>
<!--
CHANGELOG
v1.0.0 - 2026-04-13
  - 初始建置：完整 Travel App PWA
  - 5 頁面：首頁、行程詳情、預訂清單、費用記帳、更多
  - 瀏覽/編輯模式切換
  - 長按刪除行程
  - JSON 匯入/匯出
  - localStorage DataManager
  - 開車時間警告、住宿 Bar
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#4a7c59" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>旅遊行程管家</title>
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
/* ── 1. CSS Reset + Variables ────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #4a7c59;
  --green-light: #e8f5e9;
  --green-mid: #7cb88a;
  --cream: #f5f0e8;
  --card: #ffffff;
  --text: #2c3e2d;
  --muted: #7a8c7b;
  --accent: #e8a020;
  --accent-light: #fef3dc;
  --border: #e0ddd5;
  --danger: #c0392b;
  --danger-light: #fdecea;
  --blue: #3b7ecb;
  --blue-light: #e8f0fb;
  --purple: #8e44ad;
  --shadow: 0 2px 12px rgba(74,124,89,0.10);
  --radius-card: 16px;
  --radius-btn: 12px;
  --radius-tag: 20px;
}

/* ── 2. 基礎佈局 ─────────────────────────────────────────── */
html, body {
  height: 100%;
  height: 100dvh;
  font-family: 'Noto Sans TC', 'Nunito', sans-serif;
  background: var(--cream);
  color: var(--text);
  overflow: hidden;
}
.app-container {
  max-width: 430px;
  margin: 0 auto;
  height: 100vh;
  height: 100dvh; /* iOS Safari: 動態視窗高度，排除瀏覽器 UI */
  position: relative;
  overflow: hidden;
  background: var(--cream);
}
.page {
  position: absolute;
  top: 0; left: 0; right: 0;
  bottom: calc(60px + env(safe-area-inset-bottom));
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--cream);
  transition: transform 0.28s cubic-bezier(.4,0,.2,1), opacity 0.28s;
  -webkit-overflow-scrolling: touch;
}
.page-header {
  position: sticky;
  top: 0;
  background: var(--cream);
  z-index: 10;
  padding: 48px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.page-title {
  font-family: 'Nunito', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}

/* ── 3. 頁面切換動畫 ─────────────────────────────────────── */
.page.hidden {
  transform: translateX(100%);
  opacity: 0;
  pointer-events: none;
}
.page.slide-left {
  transform: translateX(-100%);
  opacity: 0;
  pointer-events: none;
}

/* ── 4. Tab Bar ──────────────────────────────────────────── */
.tab-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: calc(60px + env(safe-area-inset-bottom));
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  cursor: pointer;
  gap: 2px;
  position: relative;
  min-height: 44px;
  color: var(--muted);
  transition: color 0.2s;
}
.tab-item.active { color: var(--green); }
.tab-icon { font-size: 20px; }
.tab-label { font-size: 11px; font-weight: 500; }
.tab-badge {
  position: absolute;
  top: 6px; right: 22%;
  background: var(--danger);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 16px;
  height: 16px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 3px;
}

/* ── 5. 模式切換列 ───────────────────────────────────────── */
.mode-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--green-light);
  border-bottom: 1px solid var(--border);
}
.mode-bar.edit { background: var(--accent-light); }
#mode-icon { font-size: 18px; }
#mode-text { flex: 1; font-size: 13px; color: var(--muted); font-weight: 500; }
#mode-btn {
  padding: 6px 14px;
  border-radius: var(--radius-tag);
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  min-height: 32px;
  transition: background 0.2s;
}
.mode-bar:not(.edit) #mode-btn {
  background: var(--green);
  color: #fff;
}
.mode-bar.edit #mode-btn {
  background: var(--muted);
  color: #fff;
}

/* ── 6. 首頁元件 ─────────────────────────────────────────── */
.home-header {
  padding: 48px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: var(--cream);
  z-index: 10;
}
.btn-import {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-tag);
  font-size: 13px;
  font-weight: 600;
  color: var(--green);
  cursor: pointer;
  min-height: 44px;
}
.trips-list { padding: 12px 16px 80px; display: flex; flex-direction: column; gap: 12px; }
.trip-card {
  background: var(--card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.15s;
  -webkit-user-select: none;
  user-select: none;
}
.trip-card:active { transform: scale(0.98); }
.trip-banner {
  padding: 20px 16px 14px;
  position: relative;
  min-height: 90px;
}
.trip-banner.green  { background: linear-gradient(135deg,#4a7c59,#7cb88a); }
.trip-banner.blue   { background: linear-gradient(135deg,#3b7ecb,#6fa8e0); }
.trip-banner.orange { background: linear-gradient(135deg,#e8a020,#f4c65a); }
.trip-banner.teal   { background: linear-gradient(135deg,#00897b,#4db6ac); }
.trip-title { font-family:'Nunito',sans-serif; font-size:18px; font-weight:700; color:#fff; margin-bottom:4px; }
.trip-days  { font-size:12px; color:rgba(255,255,255,0.85); }
.trip-meta  { padding:10px 16px; display:flex; align-items:center; gap:8px; }
.trip-date  { font-size:12px; color:var(--muted); flex:1; }
.member-avatars { display:flex; gap:-4px; }
.member-avatar {
  width:26px; height:26px; border-radius:50%;
  background:var(--green-light);
  border:2px solid #fff;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; color:var(--green);
  margin-left:-6px;
}
.member-avatar:first-child { margin-left:0; }

/* 刪除確認 */
.delete-confirm {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  background: var(--danger-light);
  display: flex;
  gap: 8px;
  padding: 0 16px;
}
.delete-confirm.show {
  max-height: 70px;
  padding: 10px 16px;
}
.btn-delete-confirm {
  flex: 1;
  padding: 10px;
  background: var(--danger);
  color: #fff;
  border: none;
  border-radius: var(--radius-btn);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-height: 44px;
}
.btn-cancel-delete {
  flex: 1;
  padding: 10px;
  background: var(--card);
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-btn);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-height: 44px;
}

/* 空狀態 */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 24px;
  gap: 12px;
  text-align: center;
}
.empty-state .empty-icon { font-size: 56px; }
.empty-state h3 { font-size: 18px; color: var(--text); }
.empty-state p  { font-size: 14px; color: var(--muted); line-height: 1.6; }

/* ── 7. 詳情頁元件 ───────────────────────────────────────── */
.detail-header {
  position: sticky;
  top: 0;
  background: var(--green);
  z-index: 20;
  color: #fff;
  padding: 44px 16px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.btn-back {
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  width: 36px; height: 36px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  min-height: 44px; min-width: 44px;
}
.detail-title { font-size: 18px; font-weight: 700; flex: 1; }
.detail-dates { font-size: 12px; opacity: 0.85; }

/* 天氣卡 */
.weather-card {
  margin: 12px 16px;
  background: var(--card);
  border-radius: var(--radius-card);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: var(--shadow);
}
.weather-temp { font-family:'Nunito',sans-serif; font-size:28px; font-weight:700; color:var(--text); }
.weather-info { flex:1; }
.weather-rain { font-size:12px; color:var(--blue); font-weight:500; }
.weather-outfit { font-size:12px; color:var(--muted); margin-top:2px; }
.weather-icon { font-size:32px; }

/* Day 切換列 */
.days-scroll-wrap { position: relative; }
.days-scroll {
  display: flex;
  gap: 8px;
  padding: 8px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.days-scroll::-webkit-scrollbar { display: none; }
.day-btn {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: var(--radius-tag);
  border: 1.5px solid var(--border);
  background: var(--card);
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  min-height: 44px;
  white-space: nowrap;
  transition: all 0.2s;
}
.day-btn.active {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

/* 成員列表 */
.members-bar {
  padding: 4px 16px 8px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.member-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: var(--green-light);
  border-radius: var(--radius-tag);
  font-size: 12px;
  font-weight: 500;
  color: var(--green);
}
.member-chip-avatar {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--green);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* 景點時間軸 */
.events-list { padding: 4px 16px 16px; display:flex; flex-direction:column; gap:8px; }
.event-card {
  background: var(--card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.event-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 14px;
  cursor: pointer;
  min-height: 54px;
}
.event-time { font-family:'Nunito',sans-serif; font-size:13px; color:var(--muted); min-width:40px; font-weight:600; }
.event-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.event-name { flex:1; font-size:15px; font-weight:600; color:var(--text); line-height:1.3; }
.event-arrow { color:var(--muted); font-size:14px; transition:transform 0.2s; flex-shrink:0; }
.event-card.expanded .event-arrow { transform: rotate(180deg); }
.event-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  padding: 0 14px;
}
.event-card.expanded .event-body { max-height: 400px; padding: 0 14px 14px; }
.event-note { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:8px; white-space:pre-wrap; }
.plan-b-note { font-size:12px; color:var(--accent); background:var(--accent-light); padding:6px 10px; border-radius:8px; margin-bottom:8px; }
.event-link, .map-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--blue);
  text-decoration: none;
  margin-right: 10px;
  padding: 4px 0;
}

/* ── 8. Badges ───────────────────────────────────────────── */
.plan-b-badge {
  background: var(--accent-light);
  color: var(--accent);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: var(--radius-tag);
  flex-shrink: 0;
}
.pending-badge {
  background: #fff3e0;
  color: #e65100;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: var(--radius-tag);
  flex-shrink: 0;
}
.booked-badge {
  background: var(--green-light);
  color: var(--green);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: var(--radius-tag);
  flex-shrink: 0;
}
.cost-badge {
  font-size: 11px;
  color: var(--muted);
  background: var(--cream);
  padding: 2px 7px;
  border-radius: var(--radius-tag);
  flex-shrink: 0;
  font-family: 'Nunito', sans-serif;
  font-weight: 600;
}

/* ── 9. 編輯模式樣式 ─────────────────────────────────────── */
.edit-actions {
  display: flex;
  gap: 0;
  align-items: center;
}
.edit-icon-btn {
  width: 36px; height: 36px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 16px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  min-height: 44px; min-width: 36px;
  transition: background 0.15s;
}
.edit-icon-btn:active { background: var(--green-light); }
.edit-icon-btn.del:active { background: var(--danger-light); }

/* 開車警告 */
.drive-warning {
  margin: 0 16px 8px;
  background: #fff3e0;
  border: 1.5px solid #e65100;
  border-radius: var(--radius-btn);
  padding: 10px 14px;
  font-size: 13px;
  color: #e65100;
  font-weight: 500;
}

/* 住宿 Bar */
.hotel-bar {
  margin: 0 16px 16px;
  background: #f3e5f5;
  border: 1.5px solid var(--purple);
  border-radius: var(--radius-card);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.hotel-icon { font-size: 24px; }
.hotel-info { flex: 1; }
.hotel-name { font-size: 15px; font-weight: 600; color: var(--purple); }
.hotel-note { font-size: 12px; color: var(--muted); margin-top: 3px; }

/* ── 10. 預訂清單頁 ──────────────────────────────────────── */
.booking-list { padding: 8px 16px 80px; display: flex; flex-direction: column; gap: 8px; }
.booking-item {
  background: var(--card);
  border-radius: var(--radius-card);
  padding: 14px 16px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 12px;
}
.booking-info { flex: 1; }
.booking-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.booking-trip { font-size: 12px; color: var(--muted); }
.booking-status-btn {
  padding: 6px 14px;
  border-radius: var(--radius-tag);
  border: none;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  min-height: 44px;
  transition: all 0.2s;
}
.booking-status-btn.none     { background: var(--cream); color: var(--muted); }
.booking-status-btn.pending  { background: #fff3e0; color: #e65100; }
.booking-status-btn.booked   { background: var(--green-light); color: var(--green); }

/* ── 11. 費用頁 ──────────────────────────────────────────── */
.expense-section { padding: 8px 16px 80px; }
.expense-trip-card {
  background: var(--card);
  border-radius: var(--radius-card);
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.expense-trip-header {
  padding: 12px 16px;
  background: var(--green-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.expense-trip-name { font-size: 15px; font-weight: 700; color: var(--green); }
.expense-rows { padding: 4px 0; }
.expense-row {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.expense-row:last-child { border-bottom: none; }
.expense-ev-name { flex: 1; font-size: 14px; }
.expense-amount { font-family: 'Nunito',sans-serif; font-size: 14px; font-weight: 600; color: var(--text); }
.expense-currency { font-size: 11px; color: var(--muted); }
.expense-split { padding: 10px 16px; background: var(--accent-light); font-size: 13px; color: var(--accent); font-weight: 500; }

/* ── 12. 更多頁 ──────────────────────────────────────────── */
.more-section { padding: 8px 16px 80px; display: flex; flex-direction: column; gap: 12px; }
.more-card {
  background: var(--card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.more-card-header {
  padding: 12px 16px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.more-card-header button {
  padding: 6px 12px;
  border-radius: var(--radius-tag);
  background: var(--green);
  color: #fff;
  border: none;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  min-height: 36px;
}
.link-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.link-item:last-child { border-bottom: none; }
.link-item a { flex: 1; font-size: 14px; color: var(--blue); text-decoration: none; word-break: break-all; }
.btn-icon-del {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 18px;
  min-height: 44px; min-width: 36px;
  display: flex; align-items: center; justify-content: center;
}
.packing-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.packing-item:last-child { border-bottom: none; }
.packing-item label {
  flex: 1;
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.packing-item label.checked { text-decoration: line-through; color: var(--muted); }
.packing-cb { width: 18px; height: 18px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
.btn-backup {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--radius-card);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  min-height: 54px;
  box-shadow: var(--shadow);
}
.btn-import-helper {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 12px;
  background: var(--blue-light);
  color: var(--blue);
  border: 1.5px solid var(--blue);
  border-radius: var(--radius-card);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-height: 48px;
}

/* 新增連結 / 打包 input row */
.add-input-row {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
}
.add-input-row input {
  flex: 1;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-btn);
  font-size: 14px;
  background: var(--cream);
  color: var(--text);
  outline: none;
}
.add-input-row input:focus { border-color: var(--green); }
.add-input-row button {
  padding: 8px 14px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--radius-btn);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-height: 44px;
}

/* ── 13. Modal ───────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1000;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal {
  background: var(--card);
  border-radius: 24px 24px 0 0;
  padding: 20px 20px 32px;
  width: 100%;
  max-width: 430px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(40px);
  transition: transform 0.25s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-close {
  background: var(--cream);
  border: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-btn);
  font-size: 14px;
  background: var(--cream);
  color: var(--text);
  outline: none;
  font-family: inherit;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--green);
}
.form-group textarea { resize: vertical; min-height: 70px; }
.color-picker { display: flex; gap: 8px; margin-top: 4px; }
.color-dot {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  transition: border-color 0.15s;
}
.color-dot.selected { border-color: var(--text); }
.color-dot.green  { background: #4a7c59; }
.color-dot.blue   { background: #3b7ecb; }
.color-dot.orange { background: #e8a020; }
.color-dot.teal   { background: #00897b; }
.btn-submit {
  width: 100%;
  padding: 14px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--radius-card);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  min-height: 52px;
  margin-top: 8px;
}
.error-list {
  background: var(--danger-light);
  border-radius: var(--radius-btn);
  padding: 10px 14px;
  margin-bottom: 14px;
}
.error-list li {
  font-size: 13px;
  color: var(--danger);
  margin-left: 14px;
  line-height: 1.8;
}
.prompt-box {
  background: var(--cream);
  border-radius: var(--radius-btn);
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text);
  line-height: 1.6;
  white-space: pre-wrap;
  margin-bottom: 10px;
  font-family: monospace;
  max-height: 200px;
  overflow-y: auto;
}

/* ── 14. FAB ─────────────────────────────────────────────── */
.fab {
  position: fixed;
  bottom: calc(76px + env(safe-area-inset-bottom));
  right: calc(50% - 215px + 16px);
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--green);
  color: #fff;
  font-size: 26px;
  border: none;
  box-shadow: 0 4px 16px rgba(74,124,89,0.35);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  transition: transform 0.2s, opacity 0.2s;
}
.fab:active { transform: scale(0.92); }
.fab.hidden { display: none; }

/* ── 15. Toast ───────────────────────────────────────────── */
.toast {
  position: fixed;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--radius-tag);
  font-size: 14px;
  font-weight: 500;
  z-index: 2000;
  max-width: 360px;
  text-align: center;
  transition: top 0.35s cubic-bezier(.4,0,.2,1);

  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.toast.show { top: 52px; }
.toast.success { background: var(--green); }
.toast.error   { background: var(--danger); }
.toast.warning { background: var(--accent); color: var(--text); }

/* ── 16. iOS safe area ───────────────────────────────────── */
.page { padding-bottom: env(safe-area-inset-bottom); }

/* ── 17. Section divider ─────────────────────────────────── */
.section-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 8px 16px 4px;
}

/* ── 18. Misc ────────────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 0 16px; }
.text-muted { color: var(--muted); }
.no-items { padding: 24px 16px; text-align: center; color: var(--muted); font-size: 14px; }
</style>
</head>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// 1. 常數
// ═══════════════════════════════════════════════════════════
const VALID_COLORS   = ['green', 'blue', 'orange', 'teal'];
const VALID_TYPES    = ['attraction', 'food', 'hotel', 'transport'];
const VALID_STATUSES = ['booked', 'pending', 'none'];
const VALID_CURRENCY = ['CAD', 'TWD', 'JPY', 'USD', 'EUR'];
const DATE_REGEX     = /^\d{4}-\d{2}-\d{2}$/;
const TIME_REGEX     = /^\d{2}:\d{2}$/;
const TYPE_COLORS    = { attraction:'#4a7c59', food:'#e8a020', hotel:'#8e44ad', transport:'#3b7ecb' };
const TYPE_LABELS    = { attraction:'景點', food:'餐廳', hotel:'住宿', transport:'交通' };
const CURRENCY_SYMBOLS = { TWD:'NT$', JPY:'¥', USD:'$', CAD:'CA$', EUR:'€' };

// ═══════════════════════════════════════════════════════════
// 2. 全域狀態
// ═══════════════════════════════════════════════════════════
const appState = {
  currentTrip: null,
  currentDay: 0,
  editMode: false,
  deletingCard: null,
  currentTab: 'home',
};

// ═══════════════════════════════════════════════════════════
// 3. DataManager（唯一資料層）
// ═══════════════════════════════════════════════════════════
const DataManager = {
  KEY: 'travel_app_data',
  _data: null,
  _saveTimer: null,

  init() {
    try {
      const raw = localStorage.getItem(this.KEY);
      this._data = raw ? JSON.parse(raw) : { trips: [], packing: [], links: [] };
    } catch (e) {
      this._data = { trips: [], packing: [], links: [] };
    }
    if (!Array.isArray(this._data.trips))   this._data.trips   = [];
    if (!Array.isArray(this._data.packing)) this._data.packing = [];
    if (!Array.isArray(this._data.links))   this._data.links   = [];
  },

  save() {
    clearTimeout(this._saveTimer);
    this._saveTimer = setTimeout(() => {
      try { localStorage.setItem(this.KEY, JSON.stringify(this._data)); }
      catch (e) { showToast('儲存失敗，儲存空間可能已滿', 'error'); }
    }, 300);
  },

  getAll()       { return this._data; },
  getTrips()     { return this._data.trips; },
  getTrip(id)    { return this._data.trips.find(t => t.id === id) || null; },

  addTrip(trip) {
    this._data.trips.push(trip);
    this.save();
  },

  updateTrip(id, data) {
    const idx = this._data.trips.findIndex(t => t.id === id);
    if (idx >= 0) { this._data.trips[idx] = { ...this._data.trips[idx], ...data }; this.save(); }
  },

  deleteTrip(id) {
    this._data.trips = this._data.trips.filter(t => t.id !== id);
    this.save();
  },

  addLink(link) {
    this._data.links.push(link);
    this.save();
  },

  deleteLink(id) {
    this._data.links = this._data.links.filter(l => l.id !== id);
    this.save();
  },

  addPackingItem(item) {
    this._data.packing.push(item);
    this.save();
  },

  togglePackingItem(id) {
    const item = this._data.packing.find(p => p.id === id);
    if (item) { item.checked = !item.checked; this.save(); }
  },

  deletePackingItem(id) {
    this._data.packing = this._data.packing.filter(p => p.id !== id);
    this.save();
  },

  exportAll() {
    return JSON.stringify(this._data, null, 2);
  },
};

// ═══════════════════════════════════════════════════════════
// 4. 工具函式
// ═══════════════════════════════════════════════════════════
function encodeHTML(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

function formatDate(str) {
  if (!str) return '';
  const p = str.split('-');
  return `${parseInt(p[1])}/${parseInt(p[2])}`;
}

function formatFullDate(str) {
  if (!str) return '';
  return str.replace(/-/g, '/');
}

function typeColor(type) {
  return TYPE_COLORS[type] || TYPE_COLORS.attraction;
}

function genId(prefix = 'id') {
  return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
}

function calcTripDays(trip) {
  if (!trip.start_date || !trip.end_date) return trip.days ? trip.days.length : 0;
  const ms = new Date(trip.end_date) - new Date(trip.start_date);
  return Math.max(Math.round(ms / 86400000) + 1, 1);
}

// ═══════════════════════════════════════════════════════════
// 5. JSON 驗證
// ═══════════════════════════════════════════════════════════
function validateTripJSON(raw) {
  let data;
  const errors = [];
  try {
    data = typeof raw === 'string' ? JSON.parse(raw) : raw;
  } catch (e) {
    return { ok: false, errors: ['JSON 格式錯誤，請確認語法正確（可用 jsonlint.com 檢查）'] };
  }
  if (!data.trip_name || typeof data.trip_name !== 'string')
    errors.push('缺少必填欄位：trip_name');
  if (!data.start_date || !DATE_REGEX.test(data.start_date))
    errors.push('start_date 格式錯誤，應為 YYYY-MM-DD');
  if (!data.end_date || !DATE_REGEX.test(data.end_date))
    errors.push('end_date 格式錯誤，應為 YYYY-MM-DD');
  if (data.cover_color && !VALID_COLORS.includes(data.cover_color))
    data.cover_color = 'green';
  if (!Array.isArray(data.days) || data.days.length === 0) {
    errors.push('days 必須是非空陣列');
  } else {
    data.days.forEach((day, di) => {
      if (!day.date || !DATE_REGEX.test(day.date))
        errors.push(`days[${di}].date 格式錯誤（應為 YYYY-MM-DD）`);
      if (Array.isArray(day.events)) {
        day.events.forEach((ev, ei) => {
          if (!ev.name || typeof ev.name !== 'string')
            errors.push(`days[${di}].events[${ei}].name 為必填`);
          if (ev.type && !VALID_TYPES.includes(ev.type))   ev.type = 'attraction';
          if (ev.status && !VALID_STATUSES.includes(ev.status)) ev.status = 'none';
          if (ev.currency && !VALID_CURRENCY.includes(ev.currency)) ev.currency = 'TWD';
          if (ev.time && !TIME_REGEX.test(ev.time)) ev.time = null;
          if (ev.url && !ev.url.startsWith('http')) ev.url = null;
        });
      }
    });
  }
  if (errors.length > 0) return { ok: false, errors };
  return { ok: true, data };
}

// ═══════════════════════════════════════════════════════════
// 6. 頁面切換
// ═══════════════════════════════════════════════════════════
let _currentPageId = 'page-home';

function showPage(toId, direction = 'right') {
  const from = document.getElementById(_currentPageId);
  const to   = document.getElementById(toId);
  if (!from || !to || from === to) return;
  from.classList.add(direction === 'right' ? 'slide-left' : 'hidden');
  to.classList.remove('hidden', 'slide-left');
  _currentPageId = toId;
}

function switchTab(page) {
  const pageId = `page-${page}`;

  // 隱藏 FABs
  document.getElementById('fab-home').classList.add('hidden');
  document.getElementById('fab-add-event').classList.add('hidden');

  // 更新 Tab 高亮
  document.querySelectorAll('.tab-item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.page === page);
  });

  appState.currentTab = page;
  showPage(pageId, 'none');

  if (page === 'home') {
    document.getElementById('fab-home').classList.remove('hidden');
    renderHome();
  } else if (page === 'booking') {
    renderBooking();
  } else if (page === 'expense') {
    renderExpense();
  } else if (page === 'more') {
    renderMore();
  }
}

// 強制切換（不走 tab bar）
function _switchPageDirect(pageId, dir) {
  document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
  showPage(pageId, dir);
}

// ═══════════════════════════════════════════════════════════
// 7. 首頁
// ═══════════════════════════════════════════════════════════
function renderHome() {
  const trips = DataManager.getTrips();
  const list  = document.getElementById('trips-list');
  const empty = document.getElementById('empty-home');
  list.innerHTML = '';
  if (trips.length === 0) {
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';
  trips.forEach(trip => {
    const el = document.createElement('div');
    el.innerHTML = buildTripCardHTML(trip);
    const card = el.firstElementChild;
    list.appendChild(card);
    bindTripCardEvents(card, trip.id);
  });
}

function buildTripCardHTML(trip) {
  const color   = VALID_COLORS.includes(trip.cover_color) ? trip.cover_color : 'green';
  const days    = calcTripDays(trip);
  const start   = trip.start_date ? formatDate(trip.start_date) : '';
  const end     = trip.end_date   ? formatDate(trip.end_date)   : '';
  const members = Array.isArray(trip.members) ? trip.members : [];
  const avatarsHTML = members.slice(0, 4).map(m =>
    `<div class="member-avatar">${encodeHTML(m.charAt(0).toUpperCase())}</div>`
  ).join('');

  return `
  <div class="trip-card" data-trip-id="${encodeHTML(trip.id)}">
    <div class="trip-banner ${encodeHTML(color)}">
      <div class="trip-title">${encodeHTML(trip.trip_name)}</div>
      <div class="trip-days">${days} 天行程</div>
    </div>
    <div class="trip-meta">
      <div class="trip-date">${encodeHTML(start)} → ${encodeHTML(end)}</div>
      <div class="member-avatars">${avatarsHTML}</div>
    </div>
    <div class="delete-confirm">
      <button class="btn-delete-confirm" data-del-id="${encodeHTML(trip.id)}">🗑 刪除此行程</button>
      <button class="btn-cancel-delete">取消</button>
    </div>
  </div>`;
}

function bindTripCardEvents(card, tripId) {
  let longPressTimer = null;

  const startLP = (e) => {
    longPressTimer = setTimeout(() => showDeleteConfirm(tripId), 500);
  };
  const cancelLP = () => clearTimeout(longPressTimer);

  card.addEventListener('touchstart',  startLP,  { passive: true });
  card.addEventListener('touchend',    cancelLP);
  card.addEventListener('touchcancel', cancelLP);
  card.addEventListener('mousedown',   startLP);
  card.addEventListener('mouseup',     cancelLP);
  card.addEventListener('mouseleave',  cancelLP);

  card.addEventListener('click', (e) => {
    if (e.target.closest('.delete-confirm')) return;
    if (appState.deletingCard === tripId) {
      hideDeleteConfirm();
      return;
    }
    openTrip(tripId);
  });

  card.querySelector('.btn-delete-confirm').addEventListener('click', (e) => {
    e.stopPropagation();
    confirmDeleteTrip(tripId);
  });
  card.querySelector('.btn-cancel-delete').addEventListener('click', (e) => {
    e.stopPropagation();
    hideDeleteConfirm();
  });
}

function showDeleteConfirm(tripId) {
  hideDeleteConfirm();
  appState.deletingCard = tripId;
  const card = document.querySelector(`[data-trip-id="${tripId}"]`);
  if (card) card.querySelector('.delete-confirm').classList.add('show');
}

function hideDeleteConfirm() {
  if (appState.deletingCard) {
    const card = document.querySelector(`[data-trip-id="${appState.deletingCard}"]`);
    if (card) card.querySelector('.delete-confirm').classList.remove('show');
    appState.deletingCard = null;
  }
}

function confirmDeleteTrip(tripId) {
  const trip = DataManager.getTrip(tripId);
  const name = trip ? trip.trip_name : '此行程';
  DataManager.deleteTrip(tripId);
  hideDeleteConfirm();
  showToast(`已刪除「${name}」`);
  renderHome();
  updateBookingBadge();
}

function openAddTripModal() {
  const html = `

function selectColor(el) {
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}

function createTrip() {
  const name    = document.getElementById('f-trip-name').value.trim();
  const start   = document.getElementById('f-start').value;
  const end     = document.getElementById('f-end').value;
  const colorEl = document.querySelector('.color-dot.selected');
  const color   = colorEl ? colorEl.dataset.color : 'green';
  const membersRaw = document.getElementById('f-members').value;
  const members = membersRaw.split(',').map(s => s.trim()).filter(Boolean);

  if (!name) { showToast('請輸入行程名稱', 'error'); return; }
  if (!start || !DATE_REGEX.test(start)) { showToast('請選擇出發日期', 'error'); return; }
  if (!end   || !DATE_REGEX.test(end))   { showToast('請選擇結束日期', 'error'); return; }
  if (end < start) { showToast('結束日期不能早於出發日期', 'error'); return; }

  const days = buildDaysFromRange(start, end);
  const trip = {
    id: genId('trip'),
    trip_name: name,
    cover_color: color,
    start_date: start,
    end_date: end,
    members,
    days,
  };
  DataManager.addTrip(trip);
  closeModal();
  showToast(`✅ 已新增「${name}」`);
  renderHome();
}

function buildDaysFromRange(start, end) {
  const days = [];
  let cur = new Date(start);
  const last = new Date(end);
  while (cur <= last) {
    const dateStr = cur.toISOString().slice(0, 10);
    days.push({ date: dateStr, label: '', events: [] });
    cur.setDate(cur.getDate() + 1);
  }
  return days;
}

// JSON 匯入
function onJSONFileSelected(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  handleJSONImport(file);
}

async function handleJSONImport(file) {
  let raw;
  try { raw = await file.text(); }
  catch (e) { showToast('讀取檔案失敗', 'error'); return; }

  const result = validateTripJSON(raw);
  if (!result.ok) {
    showToast(`匯入失敗：${result.errors[0]}`, 'error');
    showImportErrors(result.errors);
    return;
  }
  const trip = { id: genId('trip'), ...result.data };
  DataManager.addTrip(trip);
  showToast(`✅ 已匯入「${trip.trip_name}」`);
  renderHome();
  updateBookingBadge();
}

function showImportErrors(errors) {
  const listHTML = errors.map(e => `<li>${encodeHTML(e)}</li>`).join('');
  openModal(`
    <div class="modal-title">匯入錯誤 <button class="modal-close" onclick="closeModal()">✕</button></div>
    <p style="font-size:14px;color:var(--muted);margin-bottom:12px">請修正以下問題後重新匯入：</p>
    <ul class="error-list">${listHTML}</ul>
    <button class="btn-submit" onclick="closeModal()">關閉</button>
  `);
}

function openTrip(tripId) {
  appState.currentTrip = tripId;
  appState.currentDay  = 0;
  appState.editMode    = false;
  renderDetail();
  document.getElementById('fab-home').classList.add('hidden');
  _switchPageDirect('page-detail', 'right');
}

function goHome() {
  appState.editMode = false;
  document.getElementById('fab-add-event').classList.add('hidden');
  _switchPageDirect('page-home', 'left');
  document.getElementById('fab-home').classList.remove('hidden');
  document.querySelectorAll('.tab-item').forEach(b =>
    b.classList.toggle('active', b.dataset.page === 'home'));
  renderHome();
}

function renderDetail() {
  const trip = DataManager.getTrip(appState.currentTrip);
  if (!trip) { goHome(); return; }

  document.getElementById('detail-title').textContent = trip.trip_name;
  document.getElementById('detail-dates').textContent =
    `${formatFullDate(trip.start_date)} → ${formatFullDate(trip.end_date)}`;

  renderModebar();
  renderDayButtons(trip);
  renderMembers(trip);

  const day = trip.days[appState.currentDay];
  const events = day ? (day.events || []) : [];
  renderWeather(day);
  renderEventsList(events);
  renderDriveWarning(events);
  renderHotelBar(events);
}

function renderModebar() {
  const bar  = document.getElementById('mode-bar');
  const icon = document.getElementById('mode-icon');
  const text = document.getElementById('mode-text');
  const btn  = document.getElementById('mode-btn');
  if (appState.editMode) {
    bar.classList.add('edit');
    icon.textContent = '🔓';
    text.textContent = '編輯中';
    btn.textContent  = '完成編輯';
  } else {
    bar.classList.remove('edit');
    icon.textContent = '🔒';
    text.textContent = '目前為瀏覽模式';
    btn.textContent  = '解鎖編輯';
  }
}

function toggleEditMode() {
  appState.editMode = !appState.editMode;
  renderModebar();
  const trip   = DataManager.getTrip(appState.currentTrip);
  const day    = trip ? trip.days[appState.currentDay] : null;
  const events = day ? (day.events || []) : [];
  renderEventsList(events);
  const fab = document.getElementById('fab-add-event');
  fab.classList.toggle('hidden', !appState.editMode);
}

function renderDayButtons(trip) {
  const scroll = document.getElementById('days-scroll');
  scroll.innerHTML = '';
  (trip.days || []).forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = `day-btn${i === appState.currentDay ? ' active' : ''}`;
    btn.textContent = `Day ${i + 1}${day.label ? ' · ' + day.label : ''}`;
    btn.addEventListener('click', () => switchDay(i));
    scroll.appendChild(btn);
  });
}

function switchDay(index) {
  appState.currentDay = index;
  const trip   = DataManager.getTrip(appState.currentTrip);
  if (!trip) return;
  document.querySelectorAll('.day-btn').forEach((b, i) =>
    b.classList.toggle('active', i === index));
  const day    = trip.days[index];
  const events = day ? (day.events || []) : [];
  renderWeather(day);
  renderEventsList(events);
  renderDriveWarning(events);
  renderHotelBar(events);
}

function renderMembers(trip) {
  const bar = document.getElementById('members-bar');
  const members = Array.isArray(trip.members) ? trip.members : [];
  if (members.length === 0) { bar.innerHTML = ''; return; }
  bar.innerHTML = members.map(m => `
    <div class="member-chip">
      <div class="member-chip-avatar">${encodeHTML(m.charAt(0).toUpperCase())}</div>
      <span>${encodeHTML(m)}</span>
    </div>`).join('');
}

function renderWeather(day) {
  const bar = document.getElementById('weather-bar');
  if (!day) { bar.innerHTML = ''; return; }
  // 模擬天氣（實際可接 Open-Meteo API，本版用靜態示意）
  const weathers = [
    { icon:'☀️', temp:'24°C', rain:'5%',  outfit:'輕薄舒適，防曬必備' },
    { icon:'⛅', temp:'20°C', rain:'30%', outfit:'建議帶薄外套' },
    { icon:'🌧️', temp:'17°C', rain:'80%', outfit:'帶雨傘，防水外套' },
    { icon:'🌤️', temp:'22°C', rain:'15%', outfit:'T-shirt + 薄外套' },
  ];
  const w = weathers[new Date(day.date).getDay() % weathers.length];
  bar.innerHTML = `
    <div class="weather-card">
      <span class="weather-icon">${w.icon}</span>
      <div class="weather-info">
        <div class="weather-rain">降雨機率 ${w.rain}</div>
        <div class="weather-outfit">${encodeHTML(w.outfit)}</div>
      </div>
      <div class="weather-temp">${w.temp}</div>
    </div>`;
}

function renderDriveWarning(events) {
  const el = document.getElementById('drive-warning');
  const total = events.reduce((sum, e) => sum + (Number(e.drive_mins) || 0), 0);
  if (total < 240) { el.innerHTML = ''; return; }
  const h = Math.floor(total / 60), m = total % 60;
  el.innerHTML = `<div class="drive-warning">⚠️ 今日開車時間約 ${h}小時${m > 0 ? m + '分' : ''}，行程較緊湊</div>`;
}

function renderHotelBar(events) {
  const el    = document.getElementById('hotel-bar');
  const hotel = events.find(e => e.type === 'hotel');
  if (!hotel) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="hotel-bar">
      <span class="hotel-icon">🏠</span>
      <div class="hotel-info">
        <div class="hotel-name">${encodeHTML(hotel.name)}</div>
        ${hotel.note ? `<div class="hotel-note">${encodeHTML(hotel.note)}</div>` : ''}
      </div>
    </div>`;
}

function renderEventsList(events) {
  const el = document.getElementById('events-list');
  el.innerHTML = '';
  if (events.length === 0) {
    el.innerHTML = `<div class="no-items">${appState.editMode ? '點右下角 + 新增景點' : '今天沒有安排'}</div>`;
    return;
  }
  events.forEach((ev, idx) => {
    const card = buildEventCard(ev, idx);
    el.appendChild(card);
  });
}

function buildEventCard(ev, idx) {
  const div = document.createElement('div');
  div.className = 'event-card';
  div.dataset.eventIdx = idx;

  const dot   = `<div class="event-dot" style="background:${typeColor(ev.type)}"></div>`;
  const time  = ev.time ? `<span class="event-time">${encodeHTML(ev.time)}</span>` : `<span class="event-time"></span>`;
  const name  = `<span class="event-name">${encodeHTML(ev.name)}</span>`;
  const planB = ev.plan_b ? `<span class="plan-b-badge">Plan B</span>` : '';
  let statusBadge = '';
  if (ev.status === 'pending') statusBadge = `<span class="pending-badge">⚠ 需訂</span>`;
  if (ev.status === 'booked')  statusBadge = `<span class="booked-badge">✓ 已訂</span>`;
  let costBadge = '';
  if (ev.cost && ev.cost > 0) {
    const sym = CURRENCY_SYMBOLS[ev.currency] || '';
    costBadge = `<span class="cost-badge">${sym}${ev.cost}</span>`;
  }

  let rightSection = '';
  if (appState.editMode) {
    rightSection = `
      <div class="edit-actions">
        <button class="edit-icon-btn" data-action="edit" data-idx="${idx}" title="編輯">✏️</button>
        <button class="edit-icon-btn del" data-action="del" data-idx="${idx}" title="刪除">🗑</button>
      </div>`;
  } else {
    rightSection = `<span class="event-arrow">▾</span>`;
  }

  let bodyContent = '';
  if (ev.note)    bodyContent += `<p class="event-note">${encodeHTML(ev.note)}</p>`;
  if (ev.plan_b)  bodyContent += `<p class="plan-b-note">📋 備案：${encodeHTML(ev.plan_b)}</p>`;
  if (ev.url)     bodyContent += `<a class="event-link" href="${encodeHTML(ev.url)}" target="_blank" rel="noopener">🔗 相關連結</a>`;
  if (ev.address) {
    const mapsUrl = `https://maps.google.com?q=${encodeURIComponent(ev.address)}`;
    bodyContent += `<a class="map-link" href="${encodeHTML(mapsUrl)}" target="_blank" rel="noopener">📍 開啟地圖</a>`;
  }

  div.innerHTML = `
    <div class="event-header">
      ${time}${dot}${name}${planB}${statusBadge}${costBadge}${rightSection}
    </div>
    <div class="event-body">${bodyContent || '<span class="text-muted" style="font-size:13px">無備註</span>'}</div>`;

  // 事件綁定
  if (!appState.editMode) {
    div.querySelector('.event-header').addEventListener('click', () => toggleEvent(div));
  } else {
    div.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
      e.stopPropagation();
      openEditEventModal(parseInt(e.currentTarget.dataset.idx));
    });
    div.querySelector('[data-action="del"]').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteEvent(appState.currentDay, parseInt(e.currentTarget.dataset.idx));
    });
  }
  return div;
}

function toggleEvent(card) {
  card.classList.toggle('expanded');
}

function deleteEvent(dayIdx, eventIdx) {
  const trip = DataManager.getTrip(appState.currentTrip);
  if (!trip) return;
  const ev = trip.days[dayIdx].events[eventIdx];
  trip.days[dayIdx].events.splice(eventIdx, 1);
  DataManager.updateTrip(trip.id, trip);
  showToast(`已刪除「${ev.name}」`);
  const events = trip.days[dayIdx].events;
  renderEventsList(events);
  renderDriveWarning(events);
  renderHotelBar(events);
  updateBookingBadge();
}

function openAddEventModal() {
  _openEventModal(null, appState.currentDay, null);
}

function openEditEventModal(eventIdx) {
  const trip = DataManager.getTrip(appState.currentTrip);
  const ev   = trip ? trip.days[appState.currentDay].events[eventIdx] : null;

function _openEventModal(ev, dayIdx, eventIdx) {

  const v = ev || {};
  const typeOptions = VALID_TYPES.map(t =>
    `<option value="${t}" ${v.type === t ? 'selected' : ''}>${TYPE_LABELS[t]}</option>`
  ).join('');
  const statusOptions = VALID_STATUSES.map(s =>
    `<option value="${s}" ${(v.status || 'none') === s ? 'selected' : ''}>${s}</option>`
  ).join('');
  const currOptions = VALID_CURRENCY.map(c =>
    `<option value="${c}" ${(v.currency || 'TWD') === c ? 'selected' : ''}>${c}</option>`
  ).join('');

  openModal(`
    <div class="modal-title">${isNew ? '新增景點' : '編輯景點'} <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label>時間（HH:MM）</label>
      <input id="ev-time" type="time" value="${encodeHTML(v.time || '')}" /></div>
    <div class="form-group"><label>景點名稱 *</label>
      <input id="ev-name" type="text" value="${encodeHTML(v.name || '')}" placeholder="景點名稱" maxlength="60" /></div>
    <div class="form-group"><label>類型</label>
      <select id="ev-type">${typeOptions}</select></div>
    <div class="form-group"><label>預訂狀態</label>
      <select id="ev-status">${statusOptions}</select></div>
    <div class="form-group"><label>費用</label>
      <div style="display:flex;gap:8px">
        <input id="ev-cost" type="number" value="${encodeHTML(String(v.cost || ''))}" placeholder="0" style="flex:1" />
        <select id="ev-currency" style="width:90px">${currOptions}</select>
      </div></div>
    <div class="form-group"><label>地址（Google Maps 用）</label>
      <input id="ev-address" type="text" value="${encodeHTML(v.address || '')}" /></div>
    <div class="form-group"><label>連結 URL</label>
      <input id="ev-url" type="url" value="${encodeHTML(v.url || '')}" placeholder="https://" /></div>
    <div class="form-group"><label>開車分鐘（從上一站）</label>
      <input id="ev-drive" type="number" value="${encodeHTML(String(v.drive_mins || ''))}" placeholder="0" /></div>
    <div class="form-group"><label>備案（Plan B）</label>
      <input id="ev-planb" type="text" value="${encodeHTML(v.plan_b || '')}" /></div>
    <div class="form-group"><label>備註</label>
      <textarea id="ev-note">${encodeHTML(v.note || '')}</textarea></div>
    <button class="btn-submit" onclick="saveEvent(${dayIdx}, ${isNew ? 'null' : eventIdx})">
      ${isNew ? '新增景點' : '儲存變更'}
    </button>
  `);
}

function saveEvent(dayIdx, eventIdx) {
  const name   = document.getElementById('ev-name').value.trim();
  if (!name) { showToast('請輸入景點名稱', 'error'); return; }

  const timeVal = document.getElementById('ev-time').value;
  const ev = {
    time:      TIME_REGEX.test(timeVal) ? timeVal : null,
    name,
    type:      document.getElementById('ev-type').value,
    status:    document.getElementById('ev-status').value,
    cost:      parseFloat(document.getElementById('ev-cost').value) || 0,
    currency:  document.getElementById('ev-currency').value,
    address:   document.getElementById('ev-address').value.trim(),
    url:       document.getElementById('ev-url').value.trim(),
    drive_mins: parseInt(document.getElementById('ev-drive').value) || 0,
    plan_b:    document.getElementById('ev-planb').value.trim(),
    note:      document.getElementById('ev-note').value.trim(),
  };
  if (ev.url && !ev.url.startsWith('http')) ev.url = null;

  const trip = DataManager.getTrip(appState.currentTrip);
  if (!trip) return;

  if (eventIdx === null) {
    trip.days[dayIdx].events.push(ev);
    showToast(`✅ 已新增「${name}」`);
  } else {
    trip.days[dayIdx].events[eventIdx] = ev;
    showToast(`✅ 已更新「${name}」`);
  }
  DataManager.updateTrip(trip.id, trip);
  closeModal();

  const events = trip.days[dayIdx].events;
  renderEventsList(events);
  renderDriveWarning(events);
  renderHotelBar(events);
  updateBookingBadge();
}

function renderBooking() {
  const el    = document.getElementById('booking-list');
  const trips = DataManager.getTrips();
  const items = [];

  trips.forEach(trip => {
    (trip.days || []).forEach((day, di) => {
      (day.events || []).forEach((ev, ei) => {
        if (ev.status && ev.status !== 'none') {
          items.push({ trip, day, ev, di, ei });
        }
      });
    });
  });

  if (items.length === 0) {
    el.innerHTML = '<div class="no-items">目前沒有需要預訂的項目</div>';
    return;
  }

  el.innerHTML = items.map(({ trip, day, ev, di, ei }) => {
    const statusLabel = { booked:'✓ 已訂', pending:'⚠ 需訂', none:'—' }[ev.status] || ev.status;
    return `
      <div class="booking-item">
        <div class="booking-info">
          <div class="booking-name">${encodeHTML(ev.name)}</div>
          <div class="booking-trip">${encodeHTML(trip.trip_name)} · ${encodeHTML(formatDate(day.date))}</div>
        </div>
        <button class="booking-status-btn ${ev.status}"
          onclick="toggleBookingStatus('${encodeHTML(trip.id)}',${di},${ei})">
          ${statusLabel}
        </button>
      </div>`;
  }).join('');
}

function updateBookingBadge() {
  const trips   = DataManager.getTrips();
  let pending   = 0;
  trips.forEach(trip =>
    (trip.days || []).forEach(day =>
      (day.events || []).forEach(ev => { if (ev.status === 'pending') pending++; })
    )
  );
  const badge = document.getElementById('booking-badge');
  if (pending > 0) {
    badge.textContent = pending;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function toggleBookingStatus(tripId, dayIdx, evIdx) {
  const trip = DataManager.getTrip(tripId);
  if (!trip) return;
  const ev = trip.days[dayIdx].events[evIdx];
  const cycle = { none:'pending', pending:'booked', booked:'none' };
  ev.status = cycle[ev.status] || 'pending';
  DataManager.updateTrip(tripId, trip);
  renderBooking();
  updateBookingBadge();
}

// ═══════════════════════════════════════════════════════════
// 10. 費用記帳頁
// ═══════════════════════════════════════════════════════════
function renderExpense() {
  const el    = document.getElementById('expense-section');
  const trips = DataManager.getTrips();
  if (trips.length === 0) {
    el.innerHTML = '<div class="no-items" style="padding-top:40px">沒有行程資料</div>';
    return;
  }
  el.innerHTML = trips.map(trip => buildExpenseTripCard(trip)).join('');
}

function buildExpenseTripCard(trip) {
  const eventsWithCost = [];
  (trip.days || []).forEach(day => {
    (day.events || []).forEach(ev => {
      if (ev.cost && ev.cost > 0) eventsWithCost.push({ ev, date: day.date });
    });
  });
  if (eventsWithCost.length === 0) return '';

  // 按幣別加總
  const totals = {};
  eventsWithCost.forEach(({ ev }) => {
    const c = ev.currency || 'TWD';
    totals[c] = (totals[c] || 0) + (ev.cost || 0);
  });
  const members = Array.isArray(trip.members) && trip.members.length > 0 ? trip.members : null;
  const totalHTML = Object.entries(totals).map(([c, v]) => {
    const sym = CURRENCY_SYMBOLS[c] || c;
    const perPerson = members ? `（每人約 ${sym}${Math.ceil(v / members.length)}）` : '';
    return `${sym}${v.toLocaleString()}${perPerson}`;
  }).join('　');

  const rows = eventsWithCost.map(({ ev, date }) => {
    const sym = CURRENCY_SYMBOLS[ev.currency] || '';
    return `
      <div class="expense-row">
        <span style="font-size:11px;color:var(--muted);min-width:38px">${formatDate(date)}</span>
        <span class="expense-ev-name">${encodeHTML(ev.name)}</span>
        <span class="expense-amount">${sym}${(ev.cost || 0).toLocaleString()}</span>
        <span class="expense-currency">${ev.currency || ''}</span>
      </div>`;
  }).join('');

  return `
    <div class="expense-trip-card">
      <div class="expense-trip-header">
        <span class="expense-trip-name">${encodeHTML(trip.trip_name)}</span>
        <span style="font-size:12px;color:var(--muted)">${members ? members.length + '人' : ''}</span>
      </div>
      <div class="expense-rows">${rows}</div>
      <div class="expense-split">💰 合計：${totalHTML}</div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// 11. 更多頁
// ═══════════════════════════════════════════════════════════
function renderMore() {
  renderLinks();
  renderPacking();
}

function renderLinks() {
  const el    = document.getElementById('links-list');
  const links = DataManager.getAll().links;
  if (links.length === 0) {
    el.innerHTML = '<div class="no-items">還沒有連結</div>';
    return;
  }
  el.innerHTML = links.map(l => `
    <div class="link-item">
      <a href="${encodeHTML(l.url)}" target="_blank" rel="noopener">${encodeHTML(l.label || l.url)}</a>
      <button class="btn-icon-del" data-link-del="${encodeHTML(l.id)}" onclick="deleteLink('${encodeHTML(l.id)}')">🗑</button>
    </div>`).join('');
}

function renderPacking() {
  const el   = document.getElementById('packing-list');
  const list = DataManager.getAll().packing;
  if (list.length === 0) {
    el.innerHTML = '<div class="no-items">清單是空的</div>';
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="packing-item">
      <input type="checkbox" class="packing-cb" id="pk-${encodeHTML(p.id)}" ${p.checked ? 'checked' : ''}
        onchange="togglePackingItem('${encodeHTML(p.id)}')" />
      <label for="pk-${encodeHTML(p.id)}" class="${p.checked ? 'checked' : ''}">
        ${encodeHTML(p.text)}
      </label>
      <button class="btn-icon-del" onclick="deletePackingItem('${encodeHTML(p.id)}')">🗑</button>
    </div>`).join('');
}

function openAddLinkModal() {
  openModal(`
    <div class="modal-title">新增連結 <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label>顯示名稱</label>
      <input id="f-link-label" type="text" placeholder="例：訂房確認信" /></div>
    <div class="form-group"><label>URL *</label>
      <input id="f-link-url" type="url" placeholder="https://" /></div>
    <button class="btn-submit" onclick="addLink()">新增</button>
  `);
}

function addLink() {
  const label = document.getElementById('f-link-label').value.trim();
  const url   = document.getElementById('f-link-url').value.trim();
  if (!url || !url.startsWith('http')) { showToast('請輸入有效的 URL', 'error'); return; }
  DataManager.addLink({ id: genId('lnk'), label: label || url, url });
  closeModal();
  renderLinks();
  showToast('已新增連結');
}

function deleteLink(id) {
  DataManager.deleteLink(id);
  renderLinks();
  showToast('已刪除連結');
}

function openAddPackingModal() {
  openModal(`
    <div class="modal-title">新增打包項目 <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label>項目名稱 *</label>
      <input id="f-pack-text" type="text" placeholder="例：護照、藥品..." /></div>
    <button class="btn-submit" onclick="addPackingItem()">新增</button>
  `);
}

function addPackingItem() {
  const text = document.getElementById('f-pack-text').value.trim();
  if (!text) { showToast('請輸入項目名稱', 'error'); return; }
  DataManager.addPackingItem({ id: genId('pk'), text, checked: false });
  closeModal();
  renderPacking();
  showToast('已新增項目');
}

function togglePackingItem(id) {
  DataManager.togglePackingItem(id);
  renderPacking();
}

function deletePackingItem(id) {
  DataManager.deletePackingItem(id);
  renderPacking();
  showToast('已刪除項目');
}

function downloadBackup() {
  const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
  const blob  = new Blob([DataManager.exportAll()], { type:'application/json' });
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href      = url;
  a.download  = `travel-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('備份已下載');
}

// ═══════════════════════════════════════════════════════════
// 12. Modal 共用
// ═══════════════════════════════════════════════════════════
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalIfBackdrop(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ═══════════════════════════════════════════════════════════
// 13. PWA
// ═══════════════════════════════════════════════════════════
function registerServiceWorker() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

// ═══════════════════════════════════════════════════════════
// 14. 初始化
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  DataManager.init();
  registerServiceWorker();
  renderHome();
  updateBookingBadge();
});
</script>
