<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#4a7c59" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>旅遊行程管家</title>
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<script defer src="app.js"></script>
</head>
<body>
<div class="app-container">

  <!-- ── Toast ── -->
  <div id="toast" class="toast"></div>

  <!-- ── Modal 覆蓋層 ── -->
  <div id="modal-overlay" class="modal-overlay" onclick="closeModalIfBackdrop(event)">
    <div id="modal-content" class="modal"></div>
  </div>

  <!-- ── 隱藏 file input ── -->
  <input type="file" id="json-file-input" accept=".json" style="display:none" onchange="onJSONFileSelected(event)" />

  <!-- ══════════════════════════════════════════════════
       Page 1：首頁（我的行程）
  ══════════════════════════════════════════════════ -->
  <div id="page-home" class="page">
    <div class="home-header">
      <span class="page-title">✈ 我的行程</span>
      <button class="btn-import" onclick="document.getElementById('json-file-input').click()">
        📂 匯入行程
      </button>
    </div>
    <div id="trips-list" class="trips-list"></div>
    <div id="empty-home" class="empty-state" style="display:none">
      <span class="empty-icon">🗺️</span>
      <h3>還沒有行程</h3>
      <p>點右下角 + 新增行程<br>或匯入 JSON 檔案</p>
    </div>
  </div>
  <button class="fab" id="fab-home" onclick="openAddTripModal()">＋</button>

  <!-- ══════════════════════════════════════════════════
       Page 2：打包清單
  ══════════════════════════════════════════════════ -->
  <div id="page-packing" class="page hidden">
    <div class="packing-page-header">
      <span class="page-title">🧳 打包清單</span>
      <button class="btn-uncheck-all" onclick="uncheckAllPacking()">全部取消</button>
    </div>
    <div style="padding:8px 16px 80px">
      <div class="more-card">
        <div class="more-card-header">
          <span>清單</span>
          <button onclick="openAddPackingModal()">＋ 新增</button>
        </div>
        <div id="packing-list"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════
       Page 3：更多（匯入說明 + 備份）
  ══════════════════════════════════════════════════ -->
  <div id="page-more" class="page hidden">
    <div class="page-header">
      <div class="page-title">⋯ 更多</div>
    </div>
    <div class="more-section">
      <button class="btn-backup" onclick="downloadBackup()">📦 備份下載所有行程</button>
      <button class="btn-import-helper" onclick="showImportHelper()">📋 匯入說明 / 範例下載</button>
      <button class="btn-reload" onclick="reloadApp()">🔄 重新整理 / 取得最新版本</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════
       Page 4：行程詳情（含 5 個 inner tab panels）
  ══════════════════════════════════════════════════ -->
  <div id="page-detail" class="page hidden">

    <!-- 頂部 Header（永遠顯示） -->
    <div class="detail-header" id="detail-header">
      <button class="btn-back" onclick="goHome()">‹</button>
      <div style="flex:1">
        <div class="detail-title" id="detail-title" onclick="editTripTitle()" title="點擊編輯">行程名稱</div>
        <div class="detail-dates" id="detail-dates"></div>
      </div>
    </div>

    <!-- Panel 1：行程 -->
    <div id="trip-panel-itinerary" class="trip-panel">
      <div id="mode-bar" class="mode-bar">
        <span id="mode-icon">🔒</span>
        <span id="mode-text">目前為瀏覽模式</span>
        <button id="mode-btn" onclick="toggleEditMode()">解鎖編輯</button>
      </div>
      <div id="weather-bar"></div>
      <div class="days-scroll-wrap">
        <div id="days-scroll" class="days-scroll"></div>
      </div>
      <div id="day-title-bar" class="day-title-bar">
        <span id="day-title-bar-icon">📍</span>
        <div id="day-label-text" class="day-label-text" onclick="editDayLabel()"></div>
      </div>
      <div id="events-list" class="events-list"></div>
      <div id="drive-warning"></div>
      <div id="hotel-bar"></div>
      <div id="delete-day-bar"></div>
    </div>

    <!-- Panel 2：預訂 -->
    <div id="trip-panel-booking" class="trip-panel hidden">
      <div id="trip-booking-content" style="padding:12px 16px 80px;display:flex;flex-direction:column;gap:8px;"></div>
    </div>

    <!-- Panel 3：記帳 -->
    <div id="trip-panel-expense" class="trip-panel hidden">
      <div id="trip-expense-content" class="expense-section"></div>
    </div>

    <!-- Panel 4：備忘錄 -->
    <div id="trip-panel-notes" class="trip-panel hidden">
      <div id="trip-notes-content" style="padding:12px 16px 80px;display:flex;flex-direction:column;gap:8px;"></div>
    </div>

    <!-- Panel 5：成員 -->
    <div id="trip-panel-members" class="trip-panel hidden">
      <div id="trip-members-content" style="padding:12px 16px 80px;"></div>
    </div>

    <div style="height:80px"></div>
  </div>
  <button class="fab hidden" id="fab-add-event" onclick="openAddEventModal()">＋</button>

  <!-- ── 主選單 Tab Bar（3 tabs，不在行程內時顯示） ── -->
  <nav class="tab-bar" id="tab-main">
    <button class="tab-item active" data-page="home" onclick="switchTab('home')">
      <span class="tab-icon">✈</span>
      <span class="tab-label">行程</span>
    </button>
    <button class="tab-item" data-page="packing" onclick="switchTab('packing')">
      <span class="tab-icon">🧳</span>
      <span class="tab-label">打包清單</span>
    </button>
    <button class="tab-item" data-page="more" onclick="switchTab('more')">
      <span class="tab-icon">⋯</span>
      <span class="tab-label">更多</span>
    </button>
  </nav>

  <!-- ── 行程 Tab Bar（5 tabs，在行程內時顯示） ── -->
  <nav class="tab-bar" id="tab-trip" style="display:none">
    <button class="tab-item active" data-tab="itinerary" onclick="switchTripTab('itinerary')">
      <span class="tab-icon">🗓</span>
      <span class="tab-label">行程</span>
    </button>
    <button class="tab-item" data-tab="booking" onclick="switchTripTab('booking')">
      <span class="tab-icon">🎫</span>
      <span class="tab-label">預訂</span>
      <span class="tab-badge" id="trip-booking-badge" style="display:none">0</span>
    </button>
    <button class="tab-item" data-tab="expense" onclick="switchTripTab('expense')">
      <span class="tab-icon">💰</span>
      <span class="tab-label">記帳</span>
    </button>
    <button class="tab-item" data-tab="notes" onclick="switchTripTab('notes')">
      <span class="tab-icon">📝</span>
      <span class="tab-label">備忘錄</span>
    </button>
    <button class="tab-item" data-tab="members" onclick="switchTripTab('members')">
      <span class="tab-icon">👥</span>
      <span class="tab-label">成員</span>
    </button>
  </nav>

</div><!-- .app-container -->

</body>
</html>
